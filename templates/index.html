<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gearbox Builder Pro</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <header>
            <h1>⚙️ Gearbox Builder Pro</h1>
            <p class="subtitle">Calculate optimal compound gear ratios</p>
        </header>

        <main>
            <!-- Step 1: Motor & Efficiency -->
            <section class="section">
                <h2 class="section-title">Step 1: Motor & Efficiency</h2>
                <div class="input-grid">
                    <div class="input-group">
                        <label for="in_rpm">Input RPM</label>
                        <input type="number" id="in_rpm" value="1000" step="1">
                    </div>
                    <div class="input-group">
                        <label for="in_torque">Input Torque (Nm)</label>
                        <input type="number" id="in_torque" value="10" step="0.1">
                    </div>
                    <div class="input-group">
                        <label for="efficiency">Efficiency (0.1-1.0)</label>
                        <input type="number" id="efficiency" value="0.95" step="0.01" min="0.1" max="1.0">
                    </div>
                </div>
            </section>

            <!-- Step 2: Inventory & Goals -->
            <section class="section">
                <h2 class="section-title">Step 2: Inventory & Goals</h2>
                
                <div class="input-group">
                    <label for="inventory">Available Gears (comma separated)</label>
                    <input type="text" id="inventory" value="12, 18, 24, 30, 48, 60" class="wide">
                </div>

                <div class="input-group">
                    <label for="target">Target Ratio</label>
                    <input type="number" id="target" value="10.0" step="0.1" class="wide">
                </div>
            </section>

            <!-- Action Button -->
            <button class="btn-calculate" onclick="calculate()">Calculate Optimal Build</button>

            <!-- Loading Indicator -->
            <div id="loading" class="loading hidden">
                <p>Calculating...</p>
            </div>

            <!-- Results -->
            <section id="results" class="section results hidden">
                <h2 class="section-title">Results</h2>
                <div id="error-message" class="error-message hidden"></div>
                <div id="results-content"></div>
            </section>
        </main>

        <footer>
            <p>Gearbox Builder Pro v1.0 | Optimize your gear trains</p>
        </footer>
    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
